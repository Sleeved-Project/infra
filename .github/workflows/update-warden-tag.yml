name: 🔧 Update Warden Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Warden version to deploy (ex: v1.2.3)"
        required: true

  repository_dispatch:
    types: [update-warden-tag]

jobs:
  update-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Replace tag in docker-compose.yml
        run: |
          sed -i "s|warden:[a-zA-Z0-9.\-]*|warden:${{ github.event.inputs.version || github.event.client_payload.version }}|g" ./warden/docker-compose.yml

      - name: Create PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-warden-${{ github.event.inputs.version || github.event.client_payload.version }}
          title: "🚀 Deploy warden ${{ github.event.inputs.version || github.event.client_payload.version }}"
          body: "Auto-generated PR to update `warden` image tag to `${{ github.event.inputs.version || github.event.client_payload.version }}`"
          commit-message: "chore: update warden image to ${{ github.event.inputs.version || github.event.client_payload.version }}"
